apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-project
  template:
    metadata:
      labels:
        app: demo-project
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: demo-project
          image: demoprojectacr.azurecr.io/demo-project:IMAGE_TAG
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
