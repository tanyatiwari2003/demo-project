name: Feature Branch - Build and Deploy via Jib to ACR

on:
  push:
    branches:
      - 'feature/**'   # Triggers on any branch like feature/login, feature/api etc

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Extract branch name (feature/my-feature → feature-my-feature)
      - name: Extract Branch Name
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT
          echo "Branch: $SAFE_BRANCH"

      # 4. Build and push image to ACR using Jib (no Dockerfile needed!)
      - name: Build and Push to ACR using Jib
        run: |
          mvn compile jib:build \
            -Djib.to.image=${{ secrets.ACR_LOGIN_SERVER }}/demo-project:${{ steps.branch.outputs.branch }}-${{ github.sha }} \
            -Djib.to.auth.username=${{ secrets.ACR_USERNAME }} \
            -Djib.to.auth.password=${{ secrets.ACR_PASSWORD }} \
            -Djib.from.image=eclipse-temurin:17-jre-alpine \
            -DskipTests

      # 5. Login to Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 6. Set AKS context
      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: demo-rg
          cluster-name: demo-aks

      # 7. Create ACR image pull secret in K8s (so AKS can pull from ACR)
      - name: Create ACR Pull Secret
        run: |
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # 8. Deploy to AKS
      - name: Deploy to AKS
        run: |
          sed -i 's|ACR_LOGIN_SERVER|${{ secrets.ACR_LOGIN_SERVER }}|g' k8s/deployment.yaml
          sed -i 's|IMAGE_TAG|${{ steps.branch.outputs.branch }}-${{ github.sha }}|g' k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/demo-project --timeout=120s

      # 9. Print deployed image info
      - name: Print Deployment Info
        run: |
          echo "✅ Deployed image:"
          echo "${{ secrets.ACR_LOGIN_SERVER }}/demo-project:${{ steps.branch.outputs.branch }}-${{ github.sha }}"
          kubectl get pods
          kubectl get svc demo-project-service