name: Feature Branch - Build and Deploy via Jib to ACR
on:
  push:
    branches:
      - 'feature/**'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Branch Name
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          echo "branch=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Build and Push to ACR using Jib
        run: |
          mvn compile jib:build \
            -Djib.to.image=demoprojectacr.azurecr.io/demo-project:${{ steps.branch.outputs.branch }}-${{ github.sha }} \
            -Djib.to.auth.username=${{ secrets.ACR_USERNAME }} \
            -Djib.to.auth.password=${{ secrets.ACR_PASSWORD }} \
            -DskipTests

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: Tanya_Tiwari_RG
          cluster-name: demo-aks

      - name: Create ACR Pull Secret
        run: |
          kubectl create secret docker-registry acr-secret \
            --docker-server=demoprojectacr.azurecr.io \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          cp k8s/deployment.yaml k8s/deployment-temp.yaml
          sed -i "s|IMAGE_TAG|${{ steps.branch.outputs.branch }}-${{ github.sha }}|g" k8s/deployment-temp.yaml
          kubectl apply -f k8s/deployment-temp.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/demo-project --timeout=120s

      - name: Show Status
        run: |
          kubectl get pods
          kubectl get svc demo-project-service
